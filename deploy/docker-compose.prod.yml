# Production stack: app + zero-cache with an external managed Postgres.
#
# Setup:
#   cp deploy/.env.production.example deploy/.env.production
#   # edit deploy/.env.production
#
# Deploy:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production up -d --build
#
# Logs:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production logs -f
#
# Stop (keep volumes):
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production down

name: zentro

services:
  app:
    build:
      context: ..
      dockerfile: deploy/app/Dockerfile
    image: zentro-app:prod
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_COOKIE_DOMAIN: ${BETTER_AUTH_COOKIE_DOMAIN:?BETTER_AUTH_COOKIE_DOMAIN is required}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:?BETTER_AUTH_TRUSTED_ORIGINS is required}
      ZERO_CACHE_URL: ${ZERO_CACHE_URL:?ZERO_CACHE_URL is required}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "const r=await fetch(''http://127.0.0.1:3000/''); process.exit(r.ok || r.status===302 ? 0 : 1)"',
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s

  zero-cache:
    build:
      context: ..
      dockerfile: deploy/zero-cache/Dockerfile
    image: zentro-zero:prod
    restart: unless-stopped
    ports:
      - "${ZERO_PORT:-4848}:4848"
    env_file:
      - .env.production
    volumes:
      - zentro_zero_data:/data
    environment:
      ZERO_UPSTREAM_DB: ${DATABASE_URL:?DATABASE_URL is required}
      ZERO_CVR_DB: ${DATABASE_URL:?DATABASE_URL is required}
      ZERO_CHANGE_DB: ${DATABASE_URL:?DATABASE_URL is required}
      ZERO_REPLICA_FILE: /data/replica.db
      ZERO_QUERY_URL: http://app:3000/api/zero/query
      ZERO_MUTATE_URL: http://app:3000/api/zero/mutate
      ZERO_QUERY_FORWARD_COOKIES: "true"
      ZERO_MUTATE_FORWARD_COOKIES: "true"
      ZERO_ENABLE_CRUD_MUTATIONS: "false"
      ZERO_APP_ID: zentro
      ZERO_ADMIN_PASSWORD: ${ZERO_ADMIN_PASSWORD:?ZERO_ADMIN_PASSWORD is required}
      ZERO_LOG_LEVEL: ${ZERO_LOG_LEVEL:-info}
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4848/keepalive || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 600s

volumes:
  zentro_zero_data:
