# Production stack: app + zero-cache with an external managed Postgres.
#
# Coolify: the compose file is the source of truth. Use ${VAR} references below â€”
# literals like `NODE_ENV=production` show as locked "Hardcoded env" in the UI.
# Set values in Coolify â†’ Environment Variables. For plain docker compose, copy
# deploy/.env.production.example to deploy/.env.production.
#
# Setup (reverse-proxy compose â€” run from repo root):
#   cp deploy/.env.production.example deploy/.env.production
#   docker compose -f deploy/docker-compose.prod.yml --project-directory . \
#     --env-file deploy/.env.production up -d --build
# Add -f deploy/docker-compose.host-ports.yml only when you intentionally need
# direct host port bindings outside Coolify.
#
# Build context is "." (repo root). Coolify sets --project-directory to the repo root;
# do not use context ".." here â€” it resolves to the parent dir and breaks the build.

services:
  app:
    build:
      context: .
      dockerfile: deploy/app/Dockerfile
    image: zentro-app:prod
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - path: deploy/.env.production
        required: false
    environment:
      # Coolify magic URLs â€” assign domains to app:3000 and zero-cache:4848 in the UI
      - SERVICE_URL_APP_3000
      - SERVICE_URL_ZERO-CACHE_4848
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
      - DATABASE_URL=${DATABASE_URL:?}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?}
      - BETTER_AUTH_COOKIE_DOMAIN=${BETTER_AUTH_COOKIE_DOMAIN:?}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:?}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS:?}
      - ZERO_CACHE_URL=${ZERO_CACHE_URL:?}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "const r=await fetch(''http://127.0.0.1:3000/''); process.exit(r.ok || r.status===302 ? 0 : 1)"',
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s

  zero-cache:
    build:
      context: .
      dockerfile: deploy/zero-cache/Dockerfile
    image: zentro-zero:prod
    restart: unless-stopped
    expose:
      - "4848"
    env_file:
      - path: deploy/.env.production
        required: false
    volumes:
      - zentro_zero_data:/data
    environment:
      - ZERO_UPSTREAM_DB=${DATABASE_URL:?}
      - ZERO_CVR_DB=${DATABASE_URL:?}
      - ZERO_CHANGE_DB=${DATABASE_URL:?}
      - ZERO_REPLICA_FILE=${ZERO_REPLICA_FILE:-/data/replica.db}
      - ZERO_QUERY_URL=${ZERO_QUERY_URL:-http://app:3000/api/zero/query}
      - ZERO_MUTATE_URL=${ZERO_MUTATE_URL:-http://app:3000/api/zero/mutate}
      - ZERO_QUERY_FORWARD_COOKIES=${ZERO_QUERY_FORWARD_COOKIES:-true}
      - ZERO_MUTATE_FORWARD_COOKIES=${ZERO_MUTATE_FORWARD_COOKIES:-true}
      - ZERO_ENABLE_CRUD_MUTATIONS=${ZERO_ENABLE_CRUD_MUTATIONS:-false}
      - ZERO_APP_ID=${ZERO_APP_ID:-zentro}
      - ZERO_ADMIN_PASSWORD=${ZERO_ADMIN_PASSWORD:?}
      - ZERO_LOG_LEVEL=${ZERO_LOG_LEVEL:-info}
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4848/keepalive || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 600s

volumes:
  zentro_zero_data:
