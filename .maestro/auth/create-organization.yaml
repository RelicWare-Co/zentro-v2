url: ${MAESTRO_BASE_URL}/login
tags: [auth, organization]
---
- launchApp

- runFlow: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Elige Cómo Quieres Entrar"
    timeout: 30000

- tapOn: "Crear Nueva Organización"

- extendedWaitUntil:
    visible: "Nombre de la organización"
    timeout: 10000

- tapOn: "Ej. Tienda Principal..."
- inputText: ${MAESTRO_NEW_ORG_NAME}

- tapOn: "Crear y Entrar"

- extendedWaitUntil:
    visible: "Panel de control"
    timeout: 30000
