url: ${MAESTRO_BASE_URL}/login
tags: [auth, smoke]
---
- launchApp

- extendedWaitUntil:
    visible: "Registrarse"
    timeout: 30000

- tapOn: "Registrarse"

- extendedWaitUntil:
    visible: "Crea tu cuenta Zentro™"
    timeout: 10000

- tapOn: "Tu nombre…"
- inputText: ${MAESTRO_REGISTER_NAME}

- evalScript: ${output.registerEmail = MAESTRO_REGISTER_EMAIL || ('maestro-e2e-' + Date.now() + '@example.invalid')}

- tapOn: "tu@negocio.com…"
- inputText: ${output.registerEmail}

- tapOn:
    text: "••••••••"
    index: 0
- inputText: ${MAESTRO_REGISTER_PASSWORD}

- tapOn:
    text: "••••••••"
    index: 1
- inputText: ${MAESTRO_REGISTER_PASSWORD}

- tapOn: "Crear cuenta"

- extendedWaitUntil:
    visible: "Elige Cómo Quieres Entrar"
    timeout: 30000
