# Picks an organization by visible name (MAESTRO_ORG_NAME). No-op if already on dashboard.
url: ${MAESTRO_BASE_URL}
---
- runFlow:
    when:
      visible: "Elige Cómo Quieres Entrar"
    commands:
      - extendedWaitUntil:
          visible: ${MAESTRO_ORG_NAME}
          timeout: 15000
      - tapOn: ${MAESTRO_ORG_NAME}
      - extendedWaitUntil:
          visible: "Panel de control"
          timeout: 30000
