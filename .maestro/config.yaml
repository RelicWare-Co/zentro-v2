# Maestro E2E — Zentro (web)
# Run: bun run e2e:maestro
# Requires: app (`bun run dev`), Postgres, and `bun run zero:dev` for full flows.

flows:
  - "auth/*"
  - "products/*"

testOutputDir: build/maestro-results

env:
  MAESTRO_BASE_URL: http://localhost:3000
  MAESTRO_LOGIN_EMAIL: ""
  MAESTRO_LOGIN_PASSWORD: ""
  MAESTRO_ORG_NAME: ""
  MAESTRO_NEW_ORG_NAME: "Maestro Test Store"
